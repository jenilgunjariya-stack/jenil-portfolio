<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Jenil Gunjariya</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <script>
        // Extremely simple client-side protection
        if (sessionStorage.getItem('isAdmin') !== 'true') {
            const pwd = prompt("Unauthorized access. Enter Admin Password:");
            if (pwd === "261106") {
                sessionStorage.setItem('isAdmin', 'true');
            } else {
                window.location.href = "index.html";
            }
        }

        function logout() {
            sessionStorage.removeItem('isAdmin');
            window.location.href = "index.html";
        }

        function renderMessages() {
            const tableBody = document.getElementById('messagesTableBody');
            const statsMessages = document.getElementById('statsMessages');
            
            if (!tableBody) return;

            let savedMessages = JSON.parse(localStorage.getItem('portfolio_messages')) || [];
            
            if (statsMessages) {
                statsMessages.textContent = savedMessages.length;
            }

            if (savedMessages.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: var(--text-muted);">No messages found.</td></tr>';
                return;
            }

            tableBody.innerHTML = savedMessages.map((msg, index) => `
                <tr>
                    <td style="white-space: nowrap; font-size: 0.9rem;">${msg.date}</td>
                    <td><strong>${msg.name}</strong></td>
                    <td><a href="mailto:${msg.email}" style="color: var(--color-primary); text-decoration: none;">${msg.email}</a></td>
                    <td><a href="tel:${msg.mobile}" style="color: var(--text-main); text-decoration: none;">${msg.mobile || '-'}</a></td>
                    <td>${msg.subject || '-'}</td>
                    <td style="max-width: 300px; white-space: pre-wrap; font-size: 0.9rem;">${msg.message}</td>
                    <td>
                        <button onclick="deleteMessage(${index})" class="btn-delete"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function deleteMessage(index) {
            if (confirm("Are you sure you want to delete this message?")) {
                let savedMessages = JSON.parse(localStorage.getItem('portfolio_messages')) || [];
                savedMessages.splice(index, 1);
                localStorage.setItem('portfolio_messages', JSON.stringify(savedMessages));
                renderMessages();
            }
        }

        document.addEventListener('DOMContentLoaded', renderMessages);
    </script>

    <style>
        .admin-header {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-surface);
        }
        
        .admin-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .stat-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
        }

        .stat-card i {
            font-size: 3rem;
            color: var(--color-primary);
            margin-bottom: 1rem;
        }

        .stat-card h3 {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .stat-card p {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .message-box {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 1.5rem;
            border-radius: 10px;
            margin-top: 2rem;
        }

        .table-container {
            margin-top: 2rem;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            overflow: hidden;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1.5rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
        }

        th {
            background: rgba(255, 255, 255, 0.02);
            color: var(--color-primary);
            font-weight: 600;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .btn-delete {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            border: 1px solid rgba(220, 53, 69, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-delete:hover {
            background: #dc3545;
            color: #fff;
        }
    </style>
</head>
<body>

    <header class="admin-header">
        <div class="logo">
            <span class="logo-text">ADMIN <span style="color: var(--color-primary);">PANEL</span></span>
        </div>
        <button onclick="logout()" class="btn btn-outline" style="padding: 0.5rem 1.5rem; font-size: 0.9rem;">
            <i class="fa-solid fa-sign-out-alt"></i> Logout
        </button>
    </header>

    <div class="admin-container">
        <h2>Welcome back, <span class="highlight">Jenil</span>!</h2>
        <p style="color: var(--text-muted); margin-top: 0.5rem;">Here is your portfolio overview.</p>
        
        <div class="dashboard-grid">
            <div class="stat-card">
                <i class="fa-solid fa-envelope-open-text"></i>
                <h3>Messages</h3>
                <p id="statsMessages">0</p>
            </div>
        </div>

        <div class="message-box">
            <h3 style="margin-bottom: 1rem;"><i class="fa-solid fa-info-circle"></i> Inbox Status</h3>
            <p style="color: var(--text-muted);">Emails are still sent directly to <strong>jenilgunjariya@gmail.com</strong>. A local copy is also saved here for your convenience.</p>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Mobile</th>
                        <th>Subject</th>
                        <th>Message Content</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="messagesTableBody">
                    <!-- Messages will be injected here by JS -->
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
